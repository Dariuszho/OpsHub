<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Merger - Advanced</title>
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2e5090;
            --primary-hover: #1e3a5f;
            --accent: #00d4ff;
            --accent-glow: rgba(0, 212, 255, 0.2);
            --success: #00ff88;
            --error: #ff4757;
            --bg-dark: #0a0e27;
            --bg-card: #1a1f3a;
            --border-color: rgba(0, 212, 255, 0.2);
            --text-primary: #e8f1ff;
            --text-secondary: #b8c5d6;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', sans-serif;
            background: linear-gradient(135deg, var(--bg-dark) 0%, #0f1629 50%, #1a0e2e 100%);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .creator-badge {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 12px;
            font-weight: 600;
            color: var(--accent);
            letter-spacing: 1px;
            text-transform: uppercase;
            opacity: 0.8;
            transition: opacity 0.3s;
        }

        .creator-badge:hover {
            opacity: 1;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--bg-card);
            border: 2px solid var(--border-color);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 
                        0 0 40px var(--accent-glow);
            backdrop-filter: blur(10px);
            animation: slideIn 0.6s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 35px;
        }

        .header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--accent), #00aaff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .file-section {
            margin-bottom: 30px;
        }

        .file-label {
            display: block;
            margin-bottom: 12px;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: 0.3px;
        }

        .file-label .important {
            color: var(--accent);
            font-weight: 700;
            text-transform: uppercase;
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
        }

        #file-input {
            display: none;
        }

        .file-input-label {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 140px;
            padding: 20px;
            border: 2px dashed var(--accent);
            border-radius: 12px;
            background: rgba(0, 212, 255, 0.05);
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .file-input-label::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.1), transparent);
            transition: left 0.5s;
        }

        .file-input-label:hover::before {
            left: 100%;
        }

        .file-input-label:hover {
            background: rgba(0, 212, 255, 0.1);
            border-color: #00aaff;
        }

        .file-input-content {
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .file-input-icon {
            font-size: 2.5rem;
            margin-bottom: 12px;
            display: block;
        }

        .file-input-text {
            color: var(--text-primary);
            font-weight: 600;
            margin-bottom: 6px;
        }

        .file-input-subtext {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .file-list {
            margin-top: 20px;
            max-height: 200px;
            overflow-y: auto;
        }

        .file-item {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            background: rgba(0, 212, 255, 0.05);
            border-left: 3px solid var(--accent);
            border-radius: 6px;
            margin-bottom: 8px;
            font-size: 0.85rem;
            color: var(--text-secondary);
            cursor: grab;
            transition: all 0.2s ease;
        }

        .file-item:active {
            cursor: grabbing;
        }

        .file-item.dragging {
            opacity: 0.5;
            background: rgba(0, 212, 255, 0.15);
        }

        .file-item.drag-over {
            border-top: 2px solid var(--accent);
            margin-top: -2px;
        }

        .file-item-drag {
            cursor: grab;
            color: var(--text-secondary);
            margin-right: 8px;
            opacity: 0.5;
            transition: opacity 0.2s;
        }

        .file-item-drag:hover {
            opacity: 1;
        }

        .file-item-index {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 24px;
            height: 24px;
            background: var(--accent);
            color: var(--bg-dark);
            border-radius: 4px;
            font-weight: 700;
            margin-right: 10px;
            font-size: 0.75rem;
        }

        .file-item-name {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .file-item-actions {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-left: 10px;
        }

        .file-item-move {
            cursor: pointer;
            color: var(--accent);
            font-weight: 700;
            opacity: 0.6;
            transition: opacity 0.2s;
            padding: 2px 6px;
            font-size: 0.8rem;
        }

        .file-item-move:hover {
            opacity: 1;
        }

        .file-item-move.disabled {
            opacity: 0.2;
            cursor: not-allowed;
        }

        .file-item-remove {
            cursor: pointer;
            color: var(--error);
            font-weight: 700;
            margin-left: 6px;
            opacity: 0.7;
            transition: opacity 0.2s;
        }

        .file-item-remove:hover {
            opacity: 1;
        }

        .status-display {
            margin-bottom: 30px;
            padding: 16px;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            text-align: center;
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid var(--border-color);
            color: var(--accent);
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .status-display.error {
            background: rgba(255, 71, 87, 0.1);
            border-color: rgba(255, 71, 87, 0.3);
            color: var(--error);
        }

        .status-display.success {
            background: rgba(0, 255, 136, 0.1);
            border-color: rgba(0, 255, 136, 0.3);
            color: var(--success);
        }

        .button-section {
            display: flex;
            gap: 12px;
        }

        #merge-btn {
            flex: 1;
            padding: 16px 24px;
            background: linear-gradient(135deg, var(--primary), var(--primary-hover));
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            text-transform: uppercase;
            box-shadow: 0 10px 30px rgba(46, 80, 144, 0.3);
        }

        #merge-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        #merge-btn:hover:not(:disabled)::before {
            left: 100%;
        }

        #merge-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(46, 80, 144, 0.5);
            background: linear-gradient(135deg, var(--primary-hover), #1a2a4a);
        }

        #merge-btn:active:not(:disabled) {
            transform: translateY(0);
        }

        #merge-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #clear-btn {
            padding: 16px 24px;
            background: transparent;
            color: var(--text-secondary);
            border: 2px solid var(--border-color);
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        #clear-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(0, 212, 255, 0.05);
        }

        .scrollbar {
            scrollbar-width: thin;
            scrollbar-color: var(--accent) transparent;
        }

        .scrollbar::-webkit-scrollbar {
            width: 6px;
        }

        .scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .scrollbar::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 3px;
        }

        .scrollbar::-webkit-scrollbar-thumb:hover {
            background: #00aaff;
        }

        .pulse {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.6;
            }
        }

        @media (max-width: 600px) {
            .container {
                padding: 24px;
            }

            .header h1 {
                font-size: 1.8rem;
            }

            #merge-btn {
                font-size: 0.9rem;
                padding: 14px 20px;
            }

            .button-section {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

<div class="creator-badge">✦ Created by Dariusz</div>

<div class="container">
    <div class="header">
        <h1>📄 PDF Merger</h1>
        <p>Advanced PDF merging with intelligent file ordering</p>
    </div>

    <div class="file-section">
        <label class="file-label">
            <span class="important">Select PDF files</span>
        </label>
        
        <div class="file-input-wrapper">
            <input type="file" id="file-input" multiple accept=".pdf">
            <label for="file-input" class="file-input-label">
                <div class="file-input-content">
                    <span class="file-input-icon">📁</span>
                    <div class="file-input-text">Click or drag PDF files here</div>
                    <div class="file-input-subtext">Add multiple PDFs</div>
                </div>
            </label>
        </div>

        <div class="file-list scrollbar" id="file-list"></div>
    </div>

    <div class="status-display" id="status">Ready to merge</div>

    <div class="button-section">
        <button id="merge-btn" disabled>Merge & Download</button>
        <button id="clear-btn">Clear</button>
    </div>
</div>

<script>
    const fileInput = document.getElementById('file-input');
    const mergeBtn = document.getElementById('merge-btn');
    const clearBtn = document.getElementById('clear-btn');
    const status = document.getElementById('status');
    const fileList = document.getElementById('file-list');
    let selectedFiles = [];

    // Handle file selection
    fileInput.addEventListener('change', (e) => {
        selectedFiles = Array.from(e.target.files);
        updateFileList();
        updateMergeButton();
    });

    // Handle drag and drop
    const fileInputLabel = document.querySelector('.file-input-label');
    
    fileInputLabel.addEventListener('dragover', (e) => {
        e.preventDefault();
        fileInputLabel.style.background = 'rgba(0, 212, 255, 0.15)';
    });

    fileInputLabel.addEventListener('dragleave', () => {
        fileInputLabel.style.background = 'rgba(0, 212, 255, 0.05)';
    });

    fileInputLabel.addEventListener('drop', (e) => {
        e.preventDefault();
        fileInputLabel.style.background = 'rgba(0, 212, 255, 0.05)';
        selectedFiles = Array.from(e.dataTransfer.files).filter(f => f.type === 'application/pdf');
        fileInput.files = e.dataTransfer.files;
        updateFileList();
        updateMergeButton();
    });

    // Update file list display
    function updateFileList() {
        fileList.innerHTML = '';
        selectedFiles.forEach((file, index) => {
            const fileItem = document.createElement('div');
            fileItem.className = 'file-item';
            fileItem.draggable = true;
            fileItem.dataset.index = index;
            fileItem.innerHTML = `
                <span class="file-item-drag">☰</span>
                <span class="file-item-index">${index + 1}</span>
                <span class="file-item-name" title="${file.name}">${file.name}</span>
                <span class="file-item-actions">
                    <span class="file-item-move ${index === 0 ? 'disabled' : ''}" onclick="moveFile(${index}, -1)" title="Move up">▲</span>
                    <span class="file-item-move ${index === selectedFiles.length - 1 ? 'disabled' : ''}" onclick="moveFile(${index}, 1)" title="Move down">▼</span>
                </span>
                <span class="file-item-remove" onclick="removeFile(${index})">✕</span>
            `;
            
            // Drag events
            fileItem.addEventListener('dragstart', handleDragStart);
            fileItem.addEventListener('dragend', handleDragEnd);
            fileItem.addEventListener('dragover', handleDragOver);
            fileItem.addEventListener('dragleave', handleDragLeave);
            fileItem.addEventListener('drop', handleDrop);
            
            fileList.appendChild(fileItem);
        });
        status.innerText = selectedFiles.length > 0 
            ? `${selectedFiles.length} file${selectedFiles.length !== 1 ? 's' : ''} selected` 
            : 'Ready to merge';
    }

    // Drag and drop reordering
    let draggedIndex = null;

    function handleDragStart(e) {
        draggedIndex = parseInt(this.dataset.index);
        this.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
    }

    function handleDragEnd(e) {
        this.classList.remove('dragging');
        document.querySelectorAll('.file-item').forEach(item => {
            item.classList.remove('drag-over');
        });
        draggedIndex = null;
    }

    function handleDragOver(e) {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        const targetIndex = parseInt(this.dataset.index);
        if (targetIndex !== draggedIndex) {
            this.classList.add('drag-over');
        }
    }

    function handleDragLeave(e) {
        this.classList.remove('drag-over');
    }

    function handleDrop(e) {
        e.preventDefault();
        this.classList.remove('drag-over');
        const targetIndex = parseInt(this.dataset.index);
        if (draggedIndex !== null && targetIndex !== draggedIndex) {
            const [movedFile] = selectedFiles.splice(draggedIndex, 1);
            selectedFiles.splice(targetIndex, 0, movedFile);
            updateFileList();
        }
    }

    // Move file up or down
    window.moveFile = function(index, direction) {
        const newIndex = index + direction;
        if (newIndex < 0 || newIndex >= selectedFiles.length) return;
        const [movedFile] = selectedFiles.splice(index, 1);
        selectedFiles.splice(newIndex, 0, movedFile);
        updateFileList();
    };

    // Remove file from list
    window.removeFile = function(index) {
        selectedFiles.splice(index, 1);
        updateFileList();
        updateMergeButton();
    };

    // Update button state
    function updateMergeButton() {
        mergeBtn.disabled = selectedFiles.length < 2;
    }

    // Clear all files
    clearBtn.addEventListener('click', () => {
        selectedFiles = [];
        fileInput.value = '';
        fileList.innerHTML = '';
        updateMergeButton();
        status.innerText = 'Ready to merge';
        status.className = 'status-display';
    });

    // Merge PDF files
    mergeBtn.addEventListener('click', async () => {
        status.innerText = 'Merging PDFs... Please wait';
        status.className = 'status-display pulse';
        mergeBtn.disabled = true;

        try {
            const { PDFDocument } = PDFLib;
            const mergedPdf = await PDFDocument.create();

            for (const file of selectedFiles) {
                const arrayBuffer = await file.arrayBuffer();
                const pdf = await PDFDocument.load(arrayBuffer);
                const copiedPages = await mergedPdf.copyPages(pdf, pdf.getPageIndices());
                copiedPages.forEach((page) => mergedPdf.addPage(page));
            }

            const pdfBytes = await mergedPdf.save();
            
            // Trigger download
            const blob = new Blob([pdfBytes], { type: 'application/pdf' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `merged_${new Date().getTime()}.pdf`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);

            status.innerText = '✓ Success! File downloaded';
            status.className = 'status-display success';
            
            // Reset after 2 seconds
            setTimeout(() => {
                selectedFiles = [];
                fileInput.value = '';
                updateFileList();
                updateMergeButton();
                status.innerText = 'Ready to merge';
                status.className = 'status-display';
            }, 2000);

        } catch (error) {
            console.error(error);
            status.innerText = '✕ Error: Could not merge files. Please check they are valid PDFs.';
            status.className = 'status-display error';
            mergeBtn.disabled = false;
        }
    });
</script>

</body>
</html>
